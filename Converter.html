<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/Estilo.css">
    <title>Convertor de moedas</title>
</head>
<body> 
    <!--INCIO 11/05/26-->
    <h1>Convertor de moedas</h1>
    
    <!-- Formulário para entrada de dados -->
    <form action="" method="">
        <label for="amount">Valor:</label>
        <input type="number" id="amount" name="amount" step="0.01" required><br><br>

        <label for="MoedaOrigem">De:</label>
        <select id="MoedaOrigem" name="MoedaOrigem">
            <option value="USD">Dólar Americano (USD)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="GBP">Libra Esterlina (GBP)</option>            
        </select><br><br>

        <label for="MoedaDestino">Para:</label>
        <select id="MoedaDestino" name="MoedaDestino">
            <option value="USD">Dólar Americano (USD)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="GBP">Libra Esterlina (GBP)</option>            
        </select><br><br>

        <button type="button" onclick="converterMoeda">Converter</button>
    </form>

    <script:src="converter.js"></script>
</body>
</html>
